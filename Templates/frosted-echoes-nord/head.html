<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{{> title}}</title>
    <meta name="description" content="{{> description}}">
    
    <!-- Begin proprietary meta tags for sharing on social media -->
    <meta property="og:title" content="{{> title}}">
    <meta property="og:description" content="{{> description}}">
    <meta property="og:type" content="website">
    {{#entry}}
    {{#thumbnail.large}}
    <meta property="og:image" content="{{{url}}}">
    <meta name="twitter:card" content="summary_large_image">
    {{/thumbnail.large}}
    <meta property="og:url" content="{{{absoluteURL}}}">
    {{/entry}}
    <!-- End proprietary meta tags for sharing on social media -->

    <link rel="alternate" type="application/rss+xml" title="{{title}}" href="{{{blogURL}}}{{{feedURL}}}">
    {{#avatar}}<link rel="icon" href="{{{avatar}}}" type="image/x-icon">{{/avatar}}
    <link rel="stylesheet" href="{{{cssURL}}}">
    
    <!-- Google Fonts -->

<link rel="preconnect" href="https://fonts.googleapis.com"> 
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
<link href="https://fonts.googleapis.com/css2?family=Inter&family=Inter+Tight:wght@400;500&family=Lato:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Emoji:wght@500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

  <!-- Webmentions -->
    <link rel="me" href="http://github.com/frostedechoes" />
    <link rel="me" href="mailto:robert@frostedechoes.net" />
    
    <link rel="authorization_endpoint" href="https://indieauth.com/auth">
    
 <link rel="webmention" href="https://webmention.io/frostedechoes.net/webmention" />
<link rel="pingback" href="https://webmention.io/frostedechoes.net/xmlrpc" />

<!-- Font Awesome -->
  <script src="https://kit.fontawesome.com/4ea0c97945.js" crossorigin="anonymous"></script>


</head>
